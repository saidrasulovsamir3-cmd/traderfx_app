<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tradeFX Trading Platform</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #131722;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1c2030;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .balance-box {
            text-align: left;
        }
        .balance-title {
            font-size: 12px;
            color: #707a8a;
        }
        .balance-value {
            font-size: 18px;
            font-weight: bold;
            color: #f0b90b;
        }
        .chart-container {
            background: #1c2030;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .trade-controls {
            background: #1c2030;
            padding: 15px;
            border-radius: 12px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #929aa5;
            margin-bottom: 5px;
            text-align: left;
        }
        input, select {
            width: 100%;
            padding: 10px;
            background: #2b3040;
            border: 1px solid #3f465a;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-up { background-color: #0ecb81; color: white; }
        .btn-down { background-color: #f6465d; color: white; }
        button:active { transform: scale(0.98); }
        #status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-box">
            <div class="balance-title">Asosiy Balans</div>
            <div class="balance-value"><span id="user-balance">100</span> STARS</div>
        </div>
        <div style="text-align: right;">
            <div id="user-name" style="font-weight: bold;">Trejder</div>
            <div style="font-size: 11px; color: #0ecb81;">Win rate: <span id="user-wr">0</span>%</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="tradeChart" style="width:100%; height:200px;"></canvas>
    </div>

    <div class="trade-controls">
        <div class="input-group">
            <label for="asset-select">Aktivni tanlang:</label>
            <select id="asset-select">
                <option value="BTC/USDT">BTC / USDT</option>
                <option value="ETH/USDT">ETH / USDT</option>
                <option value="TON/USDT">TON / USDT</option>
            </select>
        </div>

        <div class="input-group">
            <label for="trade-amount">Investitsiya miqdori (STARS):</label>
            <input type="number" id="trade-amount" value="10" min="1">
        </div>

        <div class="btn-group">
            <button class="btn-up" onclick="makeTrade('BUY')">📈 YUQORIGA</button>
            <button class="btn-down" onclick="makeTrade('SELL')">📉 PASTGA</button>
        </div>
    </div>

    <div id="status-message"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Mini Appni to'liq ekranga ochish

        const BASE_URL = "https://traderfx-app.onrender.com";
        const userId = tg.initDataUnsafe?.user?.id || 5143323565; // Test uchun default ID
        const userName = tg.initDataUnsafe?.user?.first_name || "Trejder";

        document.getElementById('user-name').innerText = userName;

        // 1. Foydalanuvchi ma'lumotlarini serverdan yuklash
        async function loadUserData() {
            try {
                const response = await fetch(`${BASE_URL}/api/user_data?user_id=${userId}`);
                const data = await response.json();
                document.getElementById('user-balance').innerText = data.stars_balance;
                
                const total = data.win_count + data.loss_count;
                const wr = total > 0 ? Math.round((data.win_count / total) * 100) : 0;
                document.getElementById('user-wr').innerText = wr;
            } catch (error) {
                console.error("Ma'lumot yuklashda xatolik:", error);
            }
        }

        // 2. Savdo qilish (BUY yoki SELL)
        async function makeTrade(direction) {
            const asset = document.getElementById('asset-select').value;
            const amount = parseInt(document.getElementById('trade-amount').value);
            const statusBox = document.getElementById('status-message');

            if (!amount || amount <= 0) {
                alert("To'g'ri miqdor kiriting!");
                return;
            }

            statusBox.style.display = "block";
            statusBox.style.backgroundColor = "#2b3040";
            statusBox.style.color = "white";
            statusBox.innerText = "Savdo ochilmoqda...";

            try {
                const response = await fetch(`${BASE_URL}/api/trade?user_id=${userId}&asset=${asset}&amount=${amount}&direction=${direction}`, {
                    method: 'POST'
                });
                const result = await response.json();

                if (result.status === "success") {
                    statusBox.innerText = result.message;
                    if (result.message.includes("Yutdingiz")) {
                        statusBox.style.backgroundColor = "rgba(14, 203, 129, 0.2)";
                        statusBox.style.color = "#0ecb81";
                    } else {
                        statusBox.style.backgroundColor = "rgba(246, 70, 93, 0.2)";
                        statusBox.style.color = "#f6465d";
                    }
                    loadUserData(); // Balansni yangilash
                } else {
                    statusBox.innerText = result.message;
                    statusBox.style.backgroundColor = "rgba(246, 70, 93, 0.2)";
                    statusBox.style.color = "#f6465d";
                }
            } catch (error) {
                statusBox.innerText = "Server bilan aloqa uzildi!";
            }
        }

        // 3. Grafik simulyatsiyasi
        const ctx = document.getElementById('tradeChart').getContext('2d');
        let chartData = Array.from({length: 15}, () => Math.floor(Math.random() * 100) + 60000);
        
        const tradeChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(15).fill(''),
                datasets: [{
                    label: 'Narx',
                    data: chartData,
                    borderColor: '#0ecb81',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { grid: { color: '#24293a' } } }
            }
        });

        // Grafikni har soniyada yangilab turish
        setInterval(() => {
            chartData.shift();
            const lastPrice = chartData[chartData.length - 1];
            const change = (Math.random() - 0.5) * 50;
            const newPrice = lastPrice + change;
            chartData.push(newPrice);
            
            tradeChart.data.datasets[0].borderColor = newPrice >= lastPrice ? '#0ecb81' : '#f6465d';
            tradeChart.update();
        }, 1000);

        // Sahifa yuklanganda ma'lumotlarni olib kelish
        loadUserData();
    </script>
</body>
</html>
