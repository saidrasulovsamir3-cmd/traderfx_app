<!DOCTYPE html>
<html lang="uz">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0d0d0d; color: #ffcc00; font-family: sans-serif; margin: 0; padding: 0; }
        /* Majburiy Obuna oynasi */
        .card { background: #1a1a1a; padding: 20px; border-radius: 20px; margin: 20px; border: 1px solid #333; }
        .channel { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        button { background: #ffcc00; color: black; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        /* Pastki menyu */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1a1a1a; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { text-align: center; font-size: 12px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Majburiy Obuna</h3>
        <div class="channel">@follora <button>Kanalga</button></div>
        <div class="channel">@stern_uz <button>Kanalga</button></div>
        <button style="width:100%; margin-top:10px;" onclick="Telegram.WebApp.sendData('TEKSHIRISH')">Tekshirish</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="Telegram.WebApp.sendData('BOOST')">🚀<br>BOOST</div>
        <div class="nav-item" onclick="Telegram.WebApp.sendData('VAZIFA')">✅<br>VAZIFA</div>
        <div class="nav-item" onclick="Telegram.WebApp.sendData('TRADE')">📈<br>TRADE</div>
        <div class="nav-item" onclick="Telegram.WebApp.sendData('AUKSION')">🔨<br>AUKSION</div>
        <div class="nav-item" onclick="Telegram.WebApp.sendData('PROFIL')">👤<br>PROFIL</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
